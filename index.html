<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Faaliyet sürelerini çoklu kronometrelerle takip eden ve raporlayan zaman yönetimi uygulaması.">
    <meta name="theme-color" content="#176f72">
    <meta name="color-scheme" content="light">

    <title>Zaman Yönetimi</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zaman Yönetimi">

    <link rel="stylesheet" href="style.css?v=3">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <main class="page-shell">
        <section id="authSection" class="container auth-container" aria-labelledby="authTitle">
            <div class="brand-mark" aria-hidden="true">⏱</div>
            <h1 id="authTitle">Giriş Yap</h1>
            <p class="auth-subtitle">Faaliyetlerini kaydet, sürelerini analiz et.</p>

            <div class="input-group">
                <label for="authEmail">E-posta</label>
                <input type="email" id="authEmail" inputmode="email" autocomplete="email" placeholder="ornek@eposta.com">
            </div>

            <div class="input-group">
                <label for="authPassword">Şifre</label>
                <input type="password" id="authPassword" autocomplete="current-password" placeholder="En az 6 karakter">
            </div>

            <p id="authMessage" class="auth-message" role="status" aria-live="polite" hidden></p>

            <button id="primaryAuthBtn" class="btn-primary full-width" type="button" onclick="handleAuth()">Giriş Yap</button>
            <button class="btn-link" type="button" onclick="resetPassword()">Şifremi unuttum</button>

            <p id="authSwitchText" class="auth-switch">
                Hesabın yok mu? <a href="#" onclick="toggleAuthMode(event)">Kayıt Ol</a>
            </p>
        </section>

        <section id="appSection" class="container app-container" style="display:none" aria-label="Zaman yönetimi uygulaması">
            <header class="app-header">
                <div class="tabs" role="tablist" aria-label="Uygulama bölümleri">
                    <button id="tabTimer" class="tab-btn active" type="button" role="tab" aria-selected="true" onclick="switchTab('timer')">Kronometre</button>
                    <button id="tabReports" class="tab-btn" type="button" role="tab" aria-selected="false" onclick="switchTab('reports')">Raporlar</button>
                </div>

                <div class="account-actions">
                    <button class="btn-darken" type="button" onclick="darkenScreen()">🌙 Karart</button>
                    <button class="btn-logout" type="button" onclick="logout()">Çıkış</button>
                    <span id="userEmailDisplay" class="user-email"></span>
                </div>
            </header>

            <p id="appStatus" class="status-message" role="status" aria-live="polite" hidden></p>

            <section id="timerSection" role="tabpanel" aria-labelledby="tabTimer">
                <div id="timersContainer"></div>
                <button id="addActivityBtn" type="button" onclick="addNewActivity()" class="btn-add-activity">+ Yeni Faaliyet Ekle</button>
            </section>

            <section id="reportsSection" role="tabpanel" aria-labelledby="tabReports" style="display:none">
                <div class="filter-group" aria-label="Rapor dönemi">
                    <button class="filter-btn active" type="button" data-range="7d">Son 7 Gün</button>
                    <button class="filter-btn" type="button" data-range="30d">Son 30 Gün</button>
                    <button class="filter-btn" type="button" data-range="all">Tümü</button>
                </div>

                <div class="date-picker-group">
                    <label class="sr-only" for="startDate">Başlangıç tarihi</label>
                    <input type="date" id="startDate" class="date-input">
                    <span aria-hidden="true">–</span>
                    <label class="sr-only" for="endDate">Bitiş tarihi</label>
                    <input type="date" id="endDate" class="date-input">
                    <button type="button" class="btn-apply-date" onclick="applyCustomDateRange()">Uygula</button>
                </div>

                <div class="report-heading-row">
                    <h2>Faaliyet Dağılımı</h2>
                    <span id="reportTotal" class="report-total">Toplam: 0 sn</span>
                </div>

                <div class="chart-container">
                    <canvas id="activityChart" aria-label="Faaliyet süreleri grafiği"></canvas>
                    <p id="chartEmptyMessage" class="empty-state" hidden>Seçilen dönemde grafik verisi yok.</p>
                </div>

                <section class="report-block" aria-labelledby="summaryTitle">
                    <h2 id="summaryTitle">Toplam Süreler</h2>
                    <div class="table-scroll">
                        <table class="summary-table">
                            <thead>
                                <tr>
                                    <th scope="col">Faaliyet</th>
                                    <th scope="col">Toplam Süre</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody"></tbody>
                        </table>
                    </div>
                </section>

                <section class="report-block" aria-labelledby="historyTitle">
                    <h2 id="historyTitle">Geçmiş Kayıtlar</h2>
                    <ul id="historyList" class="history-list"></ul>
                </section>
            </section>
        </section>
    </main>

    <div id="alarmModal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="alarmTitle">
        <div class="modal-content">
            <div class="modal-icon" aria-hidden="true">⏰</div>
            <h2 id="alarmTitle">Süre Doldu!</h2>
            <p id="alarmModalText"></p>
            <button type="button" onclick="stopAlarm()" class="btn-stop-alarm">Sustur</button>
        </div>
    </div>

    <div id="oledSaver" class="oled-saver-overlay" style="display:none" aria-label="Ekran karartma ve kilit perdesi">
        <button id="unlockHint" class="unlock-hint" type="button" onclick="showPinInput()">Uyandırmak için dokunun</button>

        <div id="unlockForm" class="unlock-form" style="display:none">
            <p>Ekran kilidi</p>
            <label class="sr-only" for="unlockPin">Dört haneli PIN</label>
            <input type="password" maxlength="4" pattern="[0-9]*" inputmode="numeric" id="unlockPin" placeholder="••••">
            <div class="unlock-actions">
                <button type="button" class="btn-unlock-cancel" onclick="hidePinInput()">İptal</button>
                <button type="button" class="btn-unlock-open" onclick="checkPin()">Aç</button>
            </div>
            <small>Varsayılan PIN: 1234</small>
        </div>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
